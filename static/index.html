<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        button.submitted {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        }
        button.error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .checkmark {
            display: none;
            width: 20px;
            height: 20px;
            margin-left: 8px;
            animation: checkAnimation 0.6s ease-out;
            vertical-align: middle;
        }
        .checkmark.show {
            display: inline-block;
        }
        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease-out;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }
        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .message.show {
            display: block;
        }
        @keyframes checkAnimation {
            0% { stroke-dashoffset: 50; opacity: 0; }
            50% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Get in Touch</h2>
        <p class="subtitle">We'd love to hear from you</p>
        <div id="message" class="message"></div>
        <form id="contactForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="gmail">Email</label>
                <input type="email" id="gmail" name="gmail" placeholder="Enter your email address" required>
            </div>
            <button type="submit" id="submitBtn">
                <span>Submit</span>
                <svg class="checkmark" viewBox="0 0 52 52" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none">
                    <path d="M6 26 L24 40 L46 10" stroke-dasharray="50" stroke-dashoffset="50"/>
                </svg>
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const checkmark = document.querySelector('.checkmark');
        const messageDiv = document.getElementById('message');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type} show`;
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const gmail = document.getElementById('gmail').value.trim();

            submitBtn.disabled = true;
            const btnText = submitBtn.querySelector('span');
            btnText.textContent = 'Submitting...';

            try {
                const response = await fetch('/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email: gmail })
                });

                const data = await response.json();

                if (response.ok) {
                    checkmark.classList.add('show');
                    submitBtn.classList.add('submitted');
                    btnText.textContent = 'Submitted';
                    showMessage('Thank you! Your information has been saved.', 'success');

                    setTimeout(() => {
                        form.reset();
                        checkmark.classList.remove('show');
                        submitBtn.classList.remove('submitted');
                        submitBtn.disabled = false;
                        btnText.textContent = 'Submit';
                    }, 2500);
                } else {
                    throw new Error(data.error || 'Submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                submitBtn.classList.add('error');
                btnText.textContent = 'Error';
                showMessage('Failed to submit. Please try again.', 'error');

                setTimeout(() => {
                    submitBtn.classList.remove('error');
                    submitBtn.disabled = false;
                    btnText.textContent = 'Submit';
                }, 2500);
            }
        });
    </script>
</body>
</html>
