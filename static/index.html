<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            margin: 24px;
        }
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        button.success { background: linear-gradient(135deg, #34d399 0%, #10b981 100%); }
        button.error-btn { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }

        .checkmark-circle {
            width: 24px;
            height: 24px;
            display: none;
        }
        .checkmark-circle.show { display: block; }
        .checkmark-circle circle {
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-dasharray: 66;
            stroke-dashoffset: 66;
            animation: drawCircle 0.4s ease forwards;
        }
        .checkmark-circle path {
            fill: none;
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.3s ease 0.4s forwards;
        }
        @keyframes drawCircle {
            to { stroke-dashoffset: 0; }
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
            display: block;
        }
        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #ef4444;
            display: block;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Get in Touch</h2>
        <p class="subtitle">We'd love to hear from you</p>

        <div id="message" class="message"></div>

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your full name"/>
        </div>
        <div class="form-group">
            <label for="gmail">Email</label>
            <input type="email" id="gmail" placeholder="Enter your email address"/>
        </div>

        <button id="submitBtn" onclick="handleSubmit()">
            <span id="btnText">Submit</span>
            <svg class="checkmark-circle" id="checkmark" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <path d="M6 12l4 4 8-8"/>
            </svg>
        </button>

        <div style="height:16px"></div>
    </div>

    <script>
        async function handleSubmit() {
            const name = document.getElementById('name').value.trim();
            const gmail = document.getElementById('gmail').value.trim();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const checkmark = document.getElementById('checkmark');
            const msg = document.getElementById('message');

            msg.className = 'message';
            msg.textContent = '';

            if (!name || !gmail) {
                msg.className = 'message error';
                msg.textContent = 'Please fill in both fields.';
                return;
            }

            btn.disabled = true;
            btnText.textContent = 'Submitting...';

            try {
                const res = await fetch('/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email: gmail })
                });

                const data = await res.json();

                if (res.ok) {
                    // Show success animation
                    btn.classList.add('success');
                    btnText.textContent = 'Submitted';
                    checkmark.classList.add('show');
                    msg.className = 'message success';
                    msg.textContent = '🎉 Thank you! Your info has been saved.';

                    setTimeout(() => {
                        document.getElementById('name').value = '';
                        document.getElementById('gmail').value = '';
                        btn.classList.remove('success');
                        btn.disabled = false;
                        btnText.textContent = 'Submit';
                        checkmark.classList.remove('show');
                        msg.className = 'message';
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Failed');
                }
            } catch (e) {
                btn.classList.add('error-btn');
                btnText.textContent = 'Error';
                msg.className = 'message error';
                msg.textContent = 'Failed to submit. Please try again.';

                setTimeout(() => {
                    btn.classList.remove('error-btn');
                    btn.disabled = false;
                    btnText.textContent = 'Submit';
                }, 2500);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
