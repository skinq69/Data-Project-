<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stay in the Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a38;
      --accent: #c8a96e;
      --accent2: #e8c98e;
      --text: #f0ede6;
      --muted: #7a7a8c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background orbs */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 70%);
      pointer-events: none;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(100,80,200,0.06) 0%, transparent 70%);
      pointer-events: none;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(3%,5%); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-4%,-3%); } }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 52px;
      width: 100%;
      max-width: 480px;
      margin: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,169,110,0.08);
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 100px;
      padding: 5px 14px;
      margin-bottom: 24px;
      animation: fadeUp 0.7s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 36px;
      animation: fadeUp 0.7s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    .form-group {
      margin-bottom: 16px;
      animation: fadeUp 0.7s 0.25s cubic-bezier(0.22,1,0.36,1) both;
    }

    .form-group:nth-child(2) { animation-delay: 0.3s; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--accent);
      background: rgba(200,169,110,0.05);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
    }

    button {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #0a0a0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeUp 0.7s 0.35s cubic-bezier(0.22,1,0.36,1) both;
      letter-spacing: 0.02em;
    }

    button:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(200,169,110,0.3);
    }

    button:active { transform: translateY(0); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      display: none;
      animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }

    .message.success {
      background: rgba(100,200,120,0.1);
      border: 1px solid rgba(100,200,120,0.25);
      color: #7dd9a0;
      display: block;
    }

    .message.error {
      background: rgba(220,80,80,0.1);
      border: 1px solid rgba(220,80,80,0.25);
      color: #f0857a;
      display: block;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0 24px;
      animation: fadeUp 0.7s 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    .privacy {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      animation: fadeUp 0.7s 0.4s cubic-bezier(0.22,1,0.36,1) both;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Early Access</div>
    <h1>Stay in <span>the loop.</span></h1>
    <p class="subtitle">Be the first to know. Drop your details below and we'll reach out when it matters.</p>

    <div class="form-group">
      <label for="name">Your Name</label>
      <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="john@example.com" autocomplete="email"/>
    </div>

    <button id="submitBtn" onclick="handleSubmit()">Join the List →</button>

    <div class="divider"></div>
    <p class="privacy">🔒 No spam, ever. Your info stays private.</p>

    <div id="message" class="message"></div>
  </div>

  <script>
    async function handleSubmit() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('message');

      msg.className = 'message';
      msg.textContent = '';

      if (!name || !email) {
        msg.className = 'message error';
        msg.textContent = 'Please fill in both fields.';
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.className = 'message error';
        msg.textContent = 'Please enter a valid email address.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const res = await fetch('/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email })
        });

        const data = await res.json();

        if (res.ok) {
          msg.className = 'message success';
          msg.textContent = '🎉 You\'re on the list! We\'ll be in touch.';
          document.getElementById('name').value = '';
          document.getElementById('email').value = '';
          btn.textContent = 'You\'re in!';
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || 'Something went wrong. Try again.';
          btn.disabled = false;
          btn.textContent = 'Join the List →';
        }
      } catch (e) {
        msg.className = 'message error';
        msg.textContent = 'Network error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Join the List →';
      }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
